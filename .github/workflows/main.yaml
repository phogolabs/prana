name: main

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pipeline:
    name: pipeline
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: prana
          POSTGRES_PASSWORD: prana
          POSTGRES_DB: prana
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      mysql:
        image: mysql:8.0
        env:
          MYSQL_USER: prana
          MYSQL_PASSWORD: prana
          MYSQL_DATABASE: prana
          MYSQL_ROOT_PASSWORD: prana
        ports:
        - 3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Check out Code
        uses: actions/checkout@v4

      - name: Set up Golang
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      - name: Run Tests
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...
        env:
          TEST_PSQL_URL: "postgres://prana:prana@127.0.0.1:${{ job.services.postgres.ports[5432] }}/prana?sslmode=disable"
          TEST_MYSQL_URL: "prana:prana@tcp(127.0.0.1:${{ job.services.mysql.ports['3306'] }})/prana"

      - name: Upload tests coverage to codecov.io
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
